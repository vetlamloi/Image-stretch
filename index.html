<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦜 Vẹt Magic Resize 1920x1080</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #a8ffcc, #ffe066, #ff99cc, #99f0ff);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      overflow: hidden;
      border: 8px solid #ffeb3b;
    }

    header {
      background: linear-gradient(90deg, #ff4d4d, #ff9f1c, #ffd60a, #4ade80, #22d3ee);
      color: white;
      padding: 25px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 { margin: 0; font-size: 32px; text-shadow: 3px 3px 6px rgba(0,0,0,0.2); }

    .content { padding: 35px; }

    button {
      padding: 16px 32px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      margin: 8px;
    }

    .btn-folder { background: linear-gradient(45deg, #ff8c42, #ffeb3b); color: #333; }
    .btn-process { background: linear-gradient(45deg, #4ade80, #22d3ee); color: white; }
    .btn-copy { background: linear-gradient(45deg, #8b5cf6, #ec4899); color: white; }

    button:hover {
      transform: scale(1.08) rotate(2deg);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .progress-container { margin: 30px 0; display: none; }
    progress {
      width: 100%;
      height: 22px;
      border-radius: 20px;
    }
    progress::-webkit-progress-value {
      background: linear-gradient(90deg, #ff4d4d, #ffd60a, #4ade80, #22d3ee);
      border-radius: 20px;
    }

    #log {
      text-align: left;
      max-height: 380px;
      overflow-y: auto;
      background: #fff9e6;
      padding: 20px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.6;
      border: 3px solid #ffe066;
    }

    .status { font-weight: bold; color: #d97706; font-size: 16px; }

    .parrot {
      font-size: 48px;
      position: absolute;
      top: 12px;
      right: 25px;
      animation: parrotFly 4s ease-in-out infinite;
      filter: drop-shadow(3px 3px 4px rgba(0,0,0,0.3));
    }

    @keyframes parrotFly {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-12px) rotate(8deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="parrot">🦜</span>
      <h1>🦜 Vẹt Magic Stretch</h1>
      <p>Kéo giãn ảnh về 1920×1080</p>
    </header>

    <div class="content">
      <button class="btn-folder" id="selectFolder">📂 Chọn Thư Mục Ảnh</button>
      
      <div id="folderInfo" style="margin: 18px 0; font-size: 16px; color: #d97706; font-weight: bold;"></div>

      <button class="btn-process" id="processBtn" disabled>🚀 Bắt Đầu Resize Tất Cả Ảnh</button>

      <div class="progress-container" id="progressContainer">
        <div class="status" id="statusText">🦜 Đang làm phép màu...</div>
        <progress id="progressBar" value="0" max="100"></progress>
        <div style="text-align:center; margin-top:10px; font-weight:bold;" id="percentText">0%</div>
      </div>

      <button class="btn-copy" id="copyFolderBtn" style="display: none;">
        📋 Copy Tên Thư Mục Kết Quả
      </button>

      <div id="log"></div>
    </div>
  </div>

  <script>
    let directoryHandle = null;
    let resultFolderName = "";

    const logDiv = document.getElementById('log');
    const processBtn = document.getElementById('processBtn');
    const copyFolderBtn = document.getElementById('copyFolderBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const percentText = document.getElementById('percentText');
    const statusText = document.getElementById('statusText');
    const folderInfo = document.getElementById('folderInfo');

    function log(message, type = 'info') {
      const time = new Date().toLocaleTimeString('vi-VN');
      let color = '#1e2937';
      if (type === 'success') color = '#22c55e';
      if (type === 'error') color = '#ef4444';
      logDiv.innerHTML += `<span style="color:${color}">[${time}] ${message}</span><br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('selectFolder').addEventListener('click', async () => {
      try {
        directoryHandle = await window.showDirectoryPicker();
        folderInfo.textContent = `📁 Đã chọn: ${directoryHandle.name}`;
        log('✅ Đã chọn thư mục!', 'success');
        processBtn.disabled = false;
        copyFolderBtn.style.display = 'none';
      } catch (err) {
        log('❌ Hủy chọn thư mục.', 'error');
      }
    });

    processBtn.addEventListener('click', async () => {
      if (!directoryHandle) return;

      log('🦜 Đang quét ảnh...');
      progressContainer.style.display = 'block';
      processBtn.disabled = true;
      copyFolderBtn.style.display = 'none';

      const now = new Date();
      resultFolderName = `Resized_Vẹt_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

      let outputDirHandle;
      try {
        outputDirHandle = await directoryHandle.getDirectoryHandle(resultFolderName, { create: true });
        log(`📁 Đã tạo thư mục: <b>${resultFolderName}</b>`, 'success');
      } catch (e) {
        log('❌ Không thể tạo thư mục.', 'error');
        return;
      }

      let total = 0, processed = 0, current = 0;

      for await (const entry of directoryHandle.values()) {
        if (entry.kind === 'file' && /\.(jpg|jpeg|png|webp)$/i.test(entry.name)) total++;
      }

      if (total === 0) {
        log('⚠️ Không tìm thấy ảnh nào!', 'error');
        return;
      }

      for await (const entry of directoryHandle.values()) {
        if (entry.kind !== 'file') continue;
        const file = await entry.getFile();
        if (!/\.(jpg|jpeg|png|webp)$/i.test(file.name)) continue;

        current++;
        const percent = Math.round((current / total) * 100);

        progressBar.value = percent;
        percentText.textContent = `${percent}%`;
        statusText.textContent = `🦜 Đang xử lý ${current}/${total}: ${file.name}`;

        try {
          const img = new Image();
          const url = URL.createObjectURL(file);
          await new Promise(r => { img.onload = r; img.src = url; });

          const canvas = document.createElement('canvas');
          canvas.width = 1920; canvas.height = 1080;
          canvas.getContext('2d').drawImage(img, 0, 0, 1920, 1080);

          const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.93));

          const newName = file.name.replace(/\.\w+$/, '') + '_1920x1080.jpg';
          const newHandle = await outputDirHandle.getFileHandle(newName, { create: true });
          const writable = await newHandle.createWritable();
          await writable.write(blob);
          await writable.close();

          processed++;
          log(`✅ Đã lưu: ${newName}`, 'success');
          URL.revokeObjectURL(url);
        } catch (e) {
          log(`❌ Lỗi với ${file.name}`, 'error');
        }
      }

      progressBar.value = 100;
      percentText.textContent = '100%';
      statusText.textContent = '🎉 Hoàn thành rồi nè! 🦜';

      log(`<b>✅ Hoàn tất! Đã resize ${processed} ảnh.</b><br>📁 Thư mục kết quả: <b>${resultFolderName}</b>`, 'success');
      
      copyFolderBtn.style.display = 'inline-block';
    });

    // Nút Copy
    copyFolderBtn.addEventListener('click', () => {
      if (!resultFolderName) return;

      navigator.clipboard.writeText(resultFolderName).then(() => {
        const originalText = copyFolderBtn.textContent;
        copyFolderBtn.textContent = '✅ Đã Copy!';
        copyFolderBtn.style.background = 'linear-gradient(45deg, #22c55e, #86efac)';
        
        setTimeout(() => {
          copyFolderBtn.textContent = originalText;
          copyFolderBtn.style.background = 'linear-gradient(45deg, #8b5cf6, #ec4899)';
        }, 2200);

        alert(`📋 ĐÃ COPY:\n\n${resultFolderName}\n\nCách mở nhanh:\n1. Mở File Explorer\n2. Dán tên thư mục vào thanh tìm kiếm\n3. Nhấn Enter`);
      });
    });
  </script>
</body>
</html>
